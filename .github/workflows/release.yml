name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release with HTML artifact
        uses: softprops/action-gh-release@v2
        with:
          files: safehouse-tracker.html
          generate_release_notes: true
